name: Docs Site

on:
  push:
    branches: [ main ]
    paths:
      - "docs/**"
      - "README.md"
      - "mkdocs.yml"
      - ".github/workflows/docs-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material
      - name: Build docs site
        run: mkdocs build --site-dir site
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: ${{ vars.ENABLE_PAGES_DEPLOY == 'true' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check Pages is enabled on repo
        id: pages_check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          status="$(curl -s -o /tmp/pages.json -w '%{http_code}' \
            -H \"Authorization: Bearer ${GH_TOKEN}\" \
            -H \"Accept: application/vnd.github+json\" \
            \"https://api.github.com/repos/${{ github.repository }}/pages\")"
          if [ "$status" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages is not enabled for this repository yet."
            echo "Enable it once in: Settings > Pages > Build and deployment > Source: GitHub Actions."
          fi
      - name: Deploy to GitHub Pages
        id: deployment
        if: ${{ steps.pages_check.outputs.enabled == 'true' }}
        uses: actions/deploy-pages@v4
