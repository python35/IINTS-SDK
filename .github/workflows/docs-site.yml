name: Docs Site

on:
  push:
    branches: [ main ]
    paths:
      - "docs/**"
      - "README.md"
      - "mkdocs.yml"
      - ".github/workflows/docs-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material
      - name: Build docs site
        run: mkdocs build --site-dir site
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: ${{ vars.ENABLE_PAGES_DEPLOY == 'true' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        id: setup_pages
        uses: actions/configure-pages@v5
        continue-on-error: true
      - name: Pages setup guidance
        if: ${{ steps.setup_pages.outcome != 'success' }}
        run: |
          echo "Skipping deploy: GitHub Pages is not enabled or this workflow lacks permissions."
          echo "Enable once in repository settings:"
          echo "Settings > Pages > Build and deployment > Source: GitHub Actions"
      - name: Deploy to GitHub Pages
        id: deployment
        if: ${{ steps.setup_pages.outcome == 'success' }}
        uses: actions/deploy-pages@v4
