name: MDMP Sync Gate

on:
  push:
    branches: [ main ]
    paths:
      - "src/iints/mdmp/**"
      - "src/iints/cli/cli.py"
      - "tools/ci/check_mdmp_sync.py"
      - ".github/workflows/mdmp-sync.yml"
      - "pyproject.toml"
  pull_request:
    branches: [ main ]
    paths:
      - "src/iints/mdmp/**"
      - "src/iints/cli/cli.py"
      - "tools/ci/check_mdmp_sync.py"
      - ".github/workflows/mdmp-sync.yml"
      - "pyproject.toml"
  workflow_dispatch:

jobs:
  mdmp-sync:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install SDK
      run: |
        python -m pip install --upgrade pip
        pip install -e .

    - name: Require MDMP repo token
      run: |
        if [ -z "${{ secrets.MDMP_REPO_TOKEN }}" ]; then
          echo "::error::Missing secret MDMP_REPO_TOKEN (PAT with read access to python35/MDMP)."
          exit 1
        fi

    - name: Checkout standalone MDMP repo
      uses: actions/checkout@v4
      with:
        repository: python35/MDMP
        ref: main
        path: external/mdmp
        token: ${{ secrets.MDMP_REPO_TOKEN }}

    - name: Install standalone MDMP package
      run: |
        pip install -e external/mdmp

    - name: Run MDMP sync check
      env:
        IINTS_MDMP_BACKEND: mdmp_core
      run: |
        python tools/ci/check_mdmp_sync.py
