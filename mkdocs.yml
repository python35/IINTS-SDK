site_name: IINTS-AF SDK Documentation
site_description: Safety-first simulation SDK for insulin algorithm research.
site_url: https://python35.github.io/IINTS-SDK/
repo_url: https://github.com/python35/IINTS-SDK
repo_name: python35/IINTS-SDK
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  logo: assets/iints-logo.png
  favicon: assets/iints-logo.png
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - codehilite
  - footnotes
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Start Here:
      - Quick Start: GETTING_STARTED.md
      - Plain Language Overview: PLAIN_LANGUAGE_GUIDE.md
      - Documentation Map: DOCUMENTATION_INDEX.md
  - Data Quality (MDMP):
      - MDMP Quickstart: MDMP_QUICKSTART.md
      - MDMP Specification (Draft): MDMP.md
  - Developer Guides:
      - Developer CLI Guide: TECHNICAL_README.md
      - Architecture & Deep Dive: COMPREHENSIVE_GUIDE.md
      - Emulation Notes: emulation_references.md
  - Manuals:
      - Manual Overview: OFFICIAL_MANUAL.md
      - Full Technical Manual: manuals/IINTS-AF_SDK_Manual.md
  - Governance & Evidence:
      - Public Documentation Overview: PUBLIC_DOCUMENTATION.md
      - Scientific Evidence & Sources: EVIDENCE_BASE.md
  - Release Notes:
      - Latest (v0.1.22): releases/v0.1.22.md
      - Release Archive: releases/INDEX.md
      - Older Releases:
          - v0.1.21: releases/v0.1.21.md
          - v0.1.20: releases/v0.1.20.md
          - v0.1.18: releases/v0.1.18.md
          - v0.1.17: releases/v0.1.17.md
          - v0.1.15: releases/v0.1.15.md
          - v0.1.5: releases/v0.1.5.md
          - v0.1.4: releases/v0.1.4.md
          - v0.0.18: releases/v0.0.18.md
