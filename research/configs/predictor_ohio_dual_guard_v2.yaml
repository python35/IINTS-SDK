predictor:
  history_minutes: 240
  horizon_minutes: 120
  time_step_minutes: 5
  feature_columns:
    - glucose_actual_mgdl
    - glucose_trend_mgdl_min
    - patient_iob_units
    - patient_cob_grams
    - effective_isf
    - effective_icr
    - effective_basal_rate_u_per_hr
    - steps
    - calories
    - heart_rate
    - sleep_minutes
    - time_of_day_sin
    - time_of_day_cos
    - meal_announcement_grams
  target_column: glucose_actual_mgdl

training:
  epochs: 40
  batch_size: 128
  learning_rate: 0.001
  hidden_size: 128
  num_layers: 2
  dropout: 0.25
  subject_level_split: true
  validation_split: 0.15
  test_split: 0.15
  seed: 42
  normalization: zscore
  loss: band_weighted
  band_weighted_low_threshold: 70.0
  band_weighted_high_threshold: 180.0
  band_weighted_low_weight: 2.5
  band_weighted_high_weight: 1.8
  band_weighted_max_weight: 6.0
  early_stopping_patience: 6
  early_stopping_min_delta: 0.0005
  meal_announcement_minutes: 15
  meal_announcement_column: carb_intake_grams
  meal_announcement_feature: meal_announcement_grams
